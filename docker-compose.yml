services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: [postgres]
    environment:
      POSTGRES_USER: pyrunner
      POSTGRES_PASSWORD: pyrunner
      POSTGRES_DB: pyrunner
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pyrunner"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DB_BACKEND: ${DB_BACKEND:-postgres}
      # --- postgres ---
      DATABASE_URL: postgresql://pyrunner:pyrunner@db:5432/pyrunner
      # --- filesystem: always /app/data inside the container ---
      FS_DATA_PATH: /app/data
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-admin123}
    volumes:
      # Bind-mount the host path (FS_DATA_PATH from .env) to /app/data inside
      # the container. Falls back to a named volume when not set.
      - ${FS_DATA_PATH:-app_data}:/app/data

volumes:
  postgres_data:
  app_data:
