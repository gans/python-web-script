<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · PyRunner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #131720; --border: #1e2535;
      --accent: #00e5a0; --accent2: #7c6aff; --danger: #ff4d6d;
      --text: #c9d1e0; --muted: #505a72; --radius: 6px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(ellipse at 20% 50%, rgba(124,106,255,.07) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(0,229,160,.05) 0%, transparent 50%);
    }
    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 1rem;
    }
    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      color: var(--accent);
      letter-spacing: -0.03em;
    }
    .brand h1 span { color: var(--accent2); }
    .brand p { color: var(--muted); font-size: 0.8rem; margin-top: 0.3rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
    }
    label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
    }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      padding: 0.65rem 0.9rem;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: var(--accent); }
    .form-group { margin-bottom: 1.25rem; }

    .btn {
      display: block;
      width: 100%;
      padding: 0.7rem;
      background: var(--accent);
      color: #0d0f14;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      font-weight: 700;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity .2s;
    }
    .btn:hover { opacity: 0.85; }

    .flash-error {
      background: #2b0d15;
      border: 1px solid var(--danger);
      color: var(--danger);
      border-radius: var(--radius);
      padding: 0.6rem 0.9rem;
      font-size: 0.82rem;
      margin-bottom: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="brand">
      <h1>Py<span>Runner</span></h1>
      <p>admin panel</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash-error">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <div class="card">
      <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" autofocus required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn">→ Sign in</button>
      </form>
    </div>
  </div>
</body>
</html>
